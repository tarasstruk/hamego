<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Hamego — HPGL to SVG</title>
    <style>
        body { font-family: monospace; padding: 1rem; background: #1a1a1a; color: #ccc; }
        textarea { width: 100%; height: 160px; background: #111; color: #eee; border: 1px solid #444; padding: 0.5rem; }
        .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin: 0.5rem 0; }
        label { display: flex; flex-direction: column; font-size: 0.85rem; }
        input[type=number] { width: 90px; background: #111; color: #eee; border: 1px solid #444; padding: 0.25rem; }
        button { margin-top: 0.5rem; padding: 0.5rem 1.5rem; background: #444; color: #eee; border: none; cursor: pointer; }
        button:hover { background: #666; }
        #output { margin-top: 1rem; background: #fff; }
    </style>
</head>
<body>
    <h2>Hamego — HPGL → SVG</h2>
    <textarea id="hpgl" placeholder="Paste HPGL content here…"></textarea>
    <div class="controls">
        <label>Scale <input type="number" id="scale" value="0.25" step="0.05" /></label>
        <label>Width (plotter units) <input type="number" id="width" value="6540" /></label>
        <label>Height (plotter units) <input type="number" id="height" value="4400" /></label>
        <label>Stroke width <input type="number" id="stroke_width" value="1" step="0.5" /></label>
    </div>
    <button id="render">Render SVG</button>
    <div id="output"></div>

    <script type="module">
        import init, { render_hpgl_to_dom } from '../pkg/hamego_wasm.js';

        await init();

        document.getElementById('render').addEventListener('click', () => {
            const hpgl         = document.getElementById('hpgl').value;
            const scale        = parseFloat(document.getElementById('scale').value);
            const width        = parseFloat(document.getElementById('width').value);
            const height       = parseFloat(document.getElementById('height').value);
            const stroke_width = parseFloat(document.getElementById('stroke_width').value);

            render_hpgl_to_dom(hpgl, scale, width, height, stroke_width, 'output');
        });
    </script>
</body>
</html>
